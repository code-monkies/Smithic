# Example smithic.toml. Copy this into your target repo and edit.

[target]
# Path to the target repo (absolute or relative to this config file).
path = "."
# Path to a markdown file describing the project's mission. Smithic reads this
# to ground its proposals. Use `mission_text = "..."` instead for inline.
mission = "./MISSION.md"

[swarm]
# Default `--runs` value when the CLI flag is omitted. Capped at 20 to keep
# Reddit/HN rate limits manageable. Override per-invocation with `--runs N`.
parallel_runs = 1
# Worktrees live under <target.path>/<worktree_root>.
worktree_root = ".smithic-worktrees"

[budget]
# In `subscription` / `bedrock` / `vertex` / `foundry` auth modes the SDK does
# not report per-call USD, so this ceiling becomes advisory in those modes.
# The token ceiling is enforced regardless.
max_usd_per_run = 5.00
max_tokens_per_run = 2_000_000

[auth]
# How to authenticate against Claude:
#   - "auto"          (default) pick at runtime based on env
#   - "api"           require ANTHROPIC_API_KEY
#   - "subscription"  use the logged-in `claude` CLI session (Pro / Max plan)
#   - "bedrock"       AWS Bedrock (CLAUDE_CODE_USE_BEDROCK=1)
#   - "vertex"        Google Vertex AI (CLAUDE_CODE_USE_VERTEX=1)
#   - "foundry"       Azure AI Foundry (CLAUDE_CODE_USE_FOUNDRY=1)
mode = "auto"
# cli_path = "/usr/local/bin/claude"   # optional override

[research]
# Where to look for market signal when --feature is omitted.
#   - "web"          Tavily MCP (if TAVILY_API_KEY set) or mcp-server-fetch fallback.
#   - "reddit"       bundled MCP wrapping Reddit's public JSON API.
#   - "hn"           bundled MCP wrapping the Hacker News Algolia search API.
#   - "producthunt"  bundled MCP wrapping Product Hunt GraphQL — needs
#                    PRODUCTHUNT_TOKEN set; otherwise skipped silently.
sources = ["web", "reddit", "hn"]
# Hours a synthesized ResearchFindings stays valid in the shared swarm cache.
cache_ttl_hours = 72
# How many feature candidates the research stage targets per run.
max_candidates = 5
# Soft cap on the query-generation Claude call (in API-mode billing).
query_budget_usd = 0.10

[rubric]
# Optional override for the bundled value-scoring rubric. The override merges
# axis-by-axis on top of src/smithic/rubric/default.yaml — set an axis weight
# to 0 to drop a default axis. Path is relative to this config file.
# path = ".smithic/rubric.yaml"

[critique]
# v0.2 self-critique stage. Spawns a fresh Claude session that has not seen
# the implement context, scores the diff against the spec, and either passes,
# revises, or aborts the run before the PR opens.
enable = true
# Maximum revise loops the critic can trigger before aborting. Spiral
# protection — bounded to prevent unbounded retry.
max_revise_loops = 1
# model = "claude-sonnet-4-6"   # optional override; falls back to [auth] model.

[pr]
# Open the PR as a draft when the critic returns "pass-with-concerns".
draft_on_critique_concerns = true
# Labels to apply at PR creation. Smithic refuses any name in its reserved
# set (dev-tracked, auto-deploy, production, release, ship-it, deploy). When
# the critic returns "pass-with-concerns", Smithic also adds
# `smithic-needs-review` automatically.
labels = []
# Default base branch for new PRs.
base_branch = "main"
